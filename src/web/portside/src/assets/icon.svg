<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <defs>
        <linearGradient id="cyberpunk-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #b734eb; stop-opacity: 1"/>
            <stop offset="100%" style="stop-color: #ffd000; stop-opacity: 1"/>
        </linearGradient>
        <mask id="text-mask">
            <!-- White areas will be visible, black areas will be transparent -->
            <rect x="0" y="0" width="200" height="200" fill="white"/>
            <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-family="Arial, sans-serif" font-size="140" fill="black"> R </text>
        </mask>
    </defs>
    <!-- Apply gradient and mask -->
    <circle cx="100" cy="100" r="100" fill="url(#cyberpunk-gradient)" mask="url(#text-mask)"/>
</svg>